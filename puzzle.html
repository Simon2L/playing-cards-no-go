    <div class="stats-bar">
        <div class="stat-item" style="flex-direction: row; gap: 16px; align-items: center;">
            <span class="stat-label">Game:</span>
            <div class="strategy-picker">
                <a href="index.html" class="strat-btn" style="text-decoration: none;">Patiens</a>
                <a href="puzzle.html" class="strat-btn active" style="text-decoration: none;">Puzzle</a>
            </div>
        </div>
    </div>

    <div id="puzzle-container">
        <div class="board">
            <div class="row">
                <div id="zone1" class="zone"></div>
                <div id="zone2" class="zone"></div>
                <div id="zone3" class="zone"></div>
            </div>
            <div class="row middle">
                <div id="zone4" class="zone"></div>
                <div id="zone5" class="zone"></div>
            </div>
            <div class="row">
                <div id="zone6" class="zone"></div>
                <div id="zone7" class="zone"></div>
                <div id="zone8" class="zone"></div>
            </div>
        </div>
    </div>
